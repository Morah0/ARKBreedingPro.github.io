<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f0f12">
    <link rel="manifest" href="manifest.json">
    <title>ARK Breeding Professional UI</title>
    <style>
        :root {
            --bg: #0f0f12;
            --surface: #1e1e24;
            --accent: #ffb74d; 
            --male: #3d86f5;   
            --female: #f53d86; 
            --mut-bg: #4caf50; 
            --delete: #ff5252;
            --input-bg: #2d2d35;
            --sidebar-w: 25%;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: #e0e0e0; 
            margin: 0; 
            display: flex;
        }

        /* БІЧНЕ МЕНЮ (SIDEBAR) */
        .sidebar {
            width: var(--sidebar-w);
            min-width: 200px; /* Гарантує мінімальний простір для назв */
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0; top: 0;
        }

        .sidebar-header {
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar-header h1 {
            font-size: 1.1rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: 1px;
            color: #fff;
        }

        .add-type-btn {
            background: var(--accent);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .add-type-btn:hover { transform: scale(1.1); }
        .add-type-btn svg { width: 20px; height: 20px; fill: #000; }

        .dino-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* Плавна прокрутка для iOS/iPadOS */
            padding: 15px 15px 20px 15px; /* Додано значний відступ знизу для комфортної прокрутки */
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* Internet Explorer 10+ */
        }

        .dino-list::-webkit-scrollbar {
            display: none; /* WebKit (Chrome, Safari, Edge) */
        }

        .dino-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 1rem;
            background: var(--input-bg);
            border-radius: 1.1rem;
            margin-bottom: 0.5rem;
            transition: transform 0.4s cubic-bezier(0.2, 0, 0, 1), opacity 0.3s, background 0.2s, border 0.2s;
            height: 3.8rem; /* Фіксована висота запобігає стрибкам інтерфейсу при зникненні кнопок */
            box-sizing: border-box; /* Дозволяє рамці не змінювати внутрішні розміри */
        }
        .dino-item.selected {
            border: 0.25rem solid var(--accent); /* Orange border */
            /* Паддінг тепер не потрібно змінювати вручну завдяки box-sizing */
        }
        .dino-item:hover { background: #363640; }

        /* Колір тексту для улюблених елементів */
        .dino-item.is-favorite .dino-name {
            color: var(--accent);
        }

        /* Анімація видалення */
        .dino-item.removing {
            opacity: 0;
            transform: translateX(-20px);
            pointer-events: none;
        }

        .dino-name {
            flex: 1;
            font-weight: 600;
            font-size: 0.9rem;
            color: #fff;
            display: flex;
            align-items: center;
            overflow: hidden;
            margin-right: 10px;
        }
        
        .dino-name-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .fav-star {
            width: 14px;
            height: 14px;
            fill: var(--accent);
            margin-right: 6px;
            flex-shrink: 0;
        }

        .dino-actions { display: flex; gap: 4px; }

        .action-btn {
            background: none;
            border: none;
            padding: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: 0.2s;
        }
        .action-btn svg { width: 18px; height: 18px; fill: #777; }
        
        .btn-fav:hover svg { fill: #fdd835; }
        .btn-edit:hover svg { fill: var(--accent); }
        .btn-del-type:hover svg { fill: var(--delete); }

        .btn-modal-fav {
            width: 48px; height: 48px;
            background: var(--input-bg);
            border: none; border-radius: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .btn-modal-fav:hover { transform: scale(1.05); }

        /* СТИЛІ ПОШУКУ З АНІМАЦІЄЮ */
        #searchBar {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            padding: 0 1.5rem;
            transition: all 0.3s ease-in-out;
        }
        #searchBar.active {
            max-height: 100px; /* Достатньо для поля вводу */
            opacity: 1;
            padding: 0 1.5rem 1rem 1.5rem;
        }

        /* ОСНОВНИЙ КОНТЕНТ */
        .main-content {
            margin-left: max(var(--sidebar-w), 200px); /* Синхронізація з min-width сайдбару */
            flex: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .content-header {
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .content-header h2 { font-size: 2rem; font-weight: 900; margin: 0; text-transform: uppercase; color: #fff; }

        /* СІТКА КАРТОК */
        .creatures-grid {
            display: flex;
            flex-direction: column;
            gap: 3rem;
            width: 100%;
            position: relative;
            padding-top: 1rem;
        }

        .generation-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            padding: 2rem 0;
            border-top: 1px dashed rgba(255,255,255,0.1);
            position: relative;
        }

        .gen-label {
            position: absolute;
            top: -10px; left: 0;
            background: var(--bg);
            padding: 0 10px;
            color: var(--accent);
            font-size: 0.7rem;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .creature-card {
            background: var(--surface);
            border-radius: 1.5rem;
            /* Коригуємо паддінг: віднімаємо 2px, щоб компенсувати збільшення рамки з 1px до 3px */
            padding: calc(1.2rem - 2px) calc(64px - 2px) calc(1.2rem - 2px) calc(2.2rem - 2px); 
            border: 3px solid rgba(255,255,255,0.05); /* Рамка завжди 3px, щоб уникнути тремтіння */
            transition: 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            width: 230px; 
            z-index: 2;
        }
        .creature-card:hover { border-color: var(--accent); z-index: 10; }

        /* Стилі підсвічування зв'язків */
        .creature-card.highlight-mother { border-color: var(--female) !important; box-shadow: 0 0 15px rgba(245, 61, 134, 0.3); z-index: 5; }
        .creature-card.highlight-father { border-color: var(--male) !important; box-shadow: 0 0 15px rgba(61, 134, 245, 0.3); z-index: 5; }
        .creature-card.highlight-child { border-color: var(--mut-bg) !important; z-index: 5; }
        
        .parent-link { cursor: pointer; transition: 0.2s; }
        .parent-link:hover { color: #fff; text-decoration: underline; }

        .card-gender-strip { position: absolute; top: 0; left: 0; width: 12px; height: 100%; }
        .card-name { 
            font-weight: 900; 
            font-size: 1.1rem; 
            margin-bottom: 2px; 
            display: flex; 
            align-items: center;
            overflow: hidden;
        }
        .card-name-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 0 1 auto;
        }
        .card-level-info { font-size: 0.75rem; font-weight: 800; color: #aaa; margin-bottom: 2px; text-transform: uppercase; white-space: nowrap; }
        .card-parents-info { font-size: 0.65rem; color: #666; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-stats-mini { display: flex; flex-direction: column; gap: 0.4rem; font-size: 0.75rem; color: #888; }
        
        .stat-row {
            display: flex;
            align-items: baseline;
            padding-left: 2%; 
        }
        
        .stat-label {
            font-weight: bold;
            color: #888;
            width: 3ch; /* Optimized for 2-letter names */
            flex-shrink: 0;
        }
        
        .card-stat-val {
            color: var(--accent);
            font-weight: bold;
            width: 7ch; /* Increased slightly for aligned "XXX | XX" */
            text-align: left;
            flex-shrink: 0;
            white-space: nowrap;
        }
        
        .second-col-label { margin-left: 0.5rem; } 

        .card-actions-vertical {
            position: absolute;
            top: 5px; 
            right: 12px; /* Offset from right edge as requested */
            display: flex;
            flex-direction: column;
            gap: 5px; /* Space between buttons */
            z-index: 2;
        }
        .card-edit-btn { /* This will be a child of card-actions-vertical */
            background: var(--input-bg);
            border: none;
            border-radius: 12px;
            padding: 9px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            opacity: 1; transition: opacity 0.2s;
        }
        .card-edit-btn svg { width: 21px; height: 21px; fill: #777; }
        .card-edit-btn:hover svg { fill: var(--accent); }

        .card-mut-badge { 
            background: var(--mut-bg); 
            color: #000; 
            font-size: 0.65rem; 
            padding: 2px 8px; 
            border-radius: 6px; 
            font-weight: 900; 
            margin-left: 6px; 
            flex-shrink: 0; 
        }

        /* SVG Шар для зв'язків */
        #connectors-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* МОДАЛЬНІ ВІКНА */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; 
            display: flex;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s;
        }
        .modal.active { opacity: 1; visibility: visible; }

        .modal-content { 
            background: var(--surface); 
            width: 95%; max-width: 400px; 
            border-radius: 2rem; 
            padding: 1.2rem; 
            box-sizing: border-box;
            max-height: 90vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* Плавна прокрутка для модального вікна */
            position: relative; 
            transform: scale(0.9) translateY(20px);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
            scrollbar-width: none; /* Firefox */
        }
        .modal-content::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Edge */
        }
        .modal.active .modal-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .close-modal {
            position: absolute;
            top: 20px; right: 20px;
            width: 36px; height: 36px;
            background: var(--input-bg);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .close-modal svg { width: 20px; height: 20px; fill: #888; }
        .close-modal:hover { background: #363640; }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .modal-header h2 { margin: 0; font-weight: 900; font-size: 1.4rem; }
        
        .btn-text-del {
            background: none;
            border: none;
            color: var(--delete);
            font-weight: 900;
            font-size: 0.75rem;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 1px;
            padding: 5px;
            transition: 0.2s;
        }
        .btn-text-del:hover { opacity: 0.7; }

        .input-tile { 
            background: var(--input-bg); border-radius: 1.2rem; 
            padding: 0.6rem 1.1rem; margin-bottom: 0.5rem; 
        }
        .tile-label { font-size: 0.7rem; color: #888; font-weight: 900; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .input-main { background: none; border: none; color: #fff; font-size: 1.1rem; font-weight: bold; outline: none; width: 100%; }

        .action-row-combined { display: flex; gap: 0.6rem; margin-bottom: 1rem; width: 100%; }
        
        .gen-btn {
            flex: 1; min-height: 38px; border-radius: 1.1rem; border: none;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1rem; background: var(--input-bg); color: #888; cursor: pointer;
        }
        .gen-btn.active-m { background: var(--male); color: #000; }
        .gen-btn.active-f { background: var(--female); color: #000; }

        .mut-tile { 
            flex: 2; min-height: 38px; border-radius: 1.1rem; 
            display: flex; align-items: center; justify-content: space-around;
            background: var(--mut-bg); color: white; padding: 0 12px; font-weight: 900;
        }

        .switch { position: relative; width: 38px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); transition: .3s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #999; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #fff; }
        input:checked + .slider:before { transform: translateX(16px); background-color: var(--mut-bg); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-bottom: 1rem; }
        .stat-tile { background: var(--input-bg); border-radius: 1rem; padding: 0.5rem 1rem; display: flex; align-items: center; justify-content: space-between; }
        .stat-name { font-weight: 900; color: #888; font-size: 0.75rem; }
        .stat-input { background: none; border: none; color: var(--accent); font-size: 1.1rem; font-weight: 900; width: 60px; text-align: right; outline: none; }
        
        .stat-input::-webkit-outer-spin-button,
        .stat-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .stat-input[type=number] { -moz-appearance: textfield; }

        .actions-row { display: flex; gap: 0.6rem; }
        .btn-save { flex: 2; min-height: 42px; background: var(--accent); color: #000; border: none; border-radius: 1.2rem; font-weight: 900; cursor: pointer; }
        .btn-del { flex: 1; min-height: 42px; background: var(--delete); color: #000; border: none; border-radius: 1.2rem; font-weight: 900; cursor: pointer; }

        .fab-add { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: var(--accent); border-radius: 22px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }

    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h1>TYPE DINO</h1>
        <div style="display: flex; gap: 8px;">
            <button class="add-type-btn" style="background: var(--input-bg);" onclick="toggleSearch()" title="Search">
                <svg viewBox="0 0 24 24" style="fill: #888;"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </button>
            <button class="add-type-btn" onclick="openTypeModal()" title="Add New">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </button>
        </div>
    </div>
    <div id="searchBar">
        <input type="text" id="searchInput" class="input-main" placeholder="Search..." oninput="renderDinoList()" 
               style="font-size: 0.9rem; border-bottom: 1px solid var(--accent); border-radius: 0; padding-bottom: 5px;">
    </div>
    <div class="dino-list" id="dinoList"></div>
</div>

<div class="main-content">
    <div id="emptyState" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#444;">
        <h2 style="margin:0;">Select a dinosaur type from the left menu</h2>
    </div>
    
    <div id="activeContent" style="display: none;">
        <div class="content-header"><h2 id="selectedTypeName">Rex</h2></div>
        <div class="creatures-grid" id="creaturesGrid"></div>
    </div>

    <button id="fabAdd" class="fab-add" style="display: none;" onclick="openModal()">
        <svg viewBox="0 0 24 24" style="width:32px; height:32px; fill:#000;"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </button>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="close-modal" onclick="closeModal()">
            <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </div>
        <div class="modal-header"><h2>NEW DINO CARD</h2></div>
        <div class="input-tile">
            <span class="tile-label">Name</span>
            <input type="text" id="m-name" class="input-main" placeholder="Unnamed">
        </div>
        <div class="action-row-combined" style="margin-bottom: 0.5rem;">
            <div class="input-tile" style="flex: 1; margin-bottom: 0; padding: 0.4rem 0.8rem;">
                <span class="tile-label" style="font-size: 0.6rem;">Mother</span>
                <select id="m-mother" class="input-main" style="font-size: 0.9rem; background: var(--input-bg); cursor: pointer;">
                    <option value="">None</option>
                </select>
            </div>
            <div class="input-tile" style="flex: 1; margin-bottom: 0; padding: 0.4rem 0.8rem;">
                <span class="tile-label" style="font-size: 0.6rem;">Father</span>
                <select id="m-father" class="input-main" style="font-size: 0.9rem; background: var(--input-bg); cursor: pointer;">
                    <option value="">None</option>
                </select>
            </div>
        </div>
        <div class="action-row-combined">
            <button type="button" id="bm" class="gen-btn active-m" onclick="setGender('M')">M</button>
            <button type="button" id="bf" class="gen-btn" onclick="setGender('F')">F</button>
            <div class="mut-tile">
                <span>MUT</span>
                <label class="switch"><input type="checkbox" id="m-mut"><span class="slider"></span></label>
            </div>
        </div>
        <div class="stats-grid">
            <div class="stat-tile"><span class="stat-name">HP</span><div style="display:flex;align-items:center;gap:4px;"><input type="number" id="s-hp" class="stat-input" style="width:35px" placeholder="0">|<input type="number" id="s-hp-m" class="stat-input" style="width:25px;color:var(--mut-bg)" placeholder="0"></div></div>
            <div class="stat-tile"><span class="stat-name">ST</span><div style="display:flex;align-items:center;gap:4px;"><input type="number" id="s-st" class="stat-input" style="width:35px" placeholder="0">|<input type="number" id="s-st-m" class="stat-input" style="width:25px;color:var(--mut-bg)" placeholder="0"></div></div>
            <div class="stat-tile"><span class="stat-name">OX</span><div style="display:flex;align-items:center;gap:4px;"><input type="number" id="s-ox" class="stat-input" style="width:35px" placeholder="0">|<input type="number" id="s-ox-m" class="stat-input" style="width:25px;color:var(--mut-bg)" placeholder="0"></div></div>
            <div class="stat-tile"><span class="stat-name">FD</span><div style="display:flex;align-items:center;gap:4px;"><input type="number" id="s-fd" class="stat-input" style="width:35px" placeholder="0">|<input type="number" id="s-fd-m" class="stat-input" style="width:25px;color:var(--mut-bg)" placeholder="0"></div></div>
            <div class="stat-tile"><span class="stat-name">WT</span><div style="display:flex;align-items:center;gap:4px;"><input type="number" id="s-wt" class="stat-input" style="width:35px" placeholder="0">|<input type="number" id="s-wt-m" class="stat-input" style="width:25px;color:var(--mut-bg)" placeholder="0"></div></div>
            <div class="stat-tile"><span class="stat-name">ML</span><div style="display:flex;align-items:center;gap:4px;"><input type="number" id="s-ml" class="stat-input" style="width:35px" placeholder="0">|<input type="number" id="s-ml-m" class="stat-input" style="width:25px;color:var(--mut-bg)" placeholder="0"></div></div>
        </div>
        <div class="actions-row">
            <button class="btn-save" onclick="saveCreature()">SAVE</button>
            <button class="btn-del" onclick="confirmDelete()">DELETE</button>
        </div>
    </div>
</div>

<!-- МОДАЛКА СТВОРЕННЯ ТИПУ -->
<div id="typeModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="typeModalTitle">NEW DINO TYPE</h2>
            <button id="modalDeleteBtn" class="btn-text-del" onclick="handleModalDelete()">Delete</button>
        </div>
        <div class="input-tile">
            <span class="tile-label">Type Name</span>
            <input type="text" id="newTypeName" class="input-main" placeholder="Enter name..." autocomplete="off">
        </div>
        <div class="actions-row">
            <button id="modalFavBtn" class="btn-modal-fav" onclick="toggleModalFav()" title="Toggle Favorite">
                <svg viewBox="0 0 24 24">
                    <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                </svg>
            </button>
            <button class="btn-save" onclick="submitNewType()">OK</button>
            <button class="btn-del" style="background: var(--input-bg); color: #888; flex: 1;" onclick="closeTypeModal()">CANCEL</button>
        </div>
    </div>
</div>

<!-- МОДАЛКА ПІДТВЕРДЖЕННЯ -->
<div id="confirmModal" class="modal">
    <div class="modal-content" style="max-width: 320px; text-align: center;">
        <div class="modal-header"><h2>CONFIRM</h2></div>
        <p id="confirmMessage" style="color: #888; margin-bottom: 25px; font-weight: 600;"></p>
        <div class="actions-row">
            <button id="confirmOkBtn" class="btn-save" style="background: var(--delete);">DELETE</button>
            <button class="btn-del" style="background: var(--input-bg); color: #888; flex: 1;" onclick="closeConfirmModal()">CANCEL</button>
        </div>
    </div>
</div>

<script>
    // ДАНІ
    const STORAGE_KEY = 'ark_breeding_pro_v1';
    let selectedDinoIndex = -1;
    let editingIdx = -1; // -1 = створення, інакше = індекс редагування
    let editingCreatureIdx = -1; // Індекс особини для редагування

    let dinoTypes = [];

    // ФУНКЦІЇ ЗБЕРЕЖЕННЯ
    function saveToStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(dinoTypes));
    }

    function loadFromStorage() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            dinoTypes = JSON.parse(saved);
        } else {
            // Початкові дані, якщо сховище порожнє
            dinoTypes = [
                { name: "Rex", favorite: true, creatures: [] },
                { name: "Argy", favorite: false, creatures: [] }
            ];
        }
    }

    // ДОПОМІЖНІ ФУНКЦІЇ ОБЧИСЛЕННЯ
    function calculateLvl(stats, muts) {
        const m = muts || { hp: 0, st: 0, ox: 0, fd: 0, wt: 0, ml: 0 };
        const sum = Number(stats.hp || 0) + Number(stats.st || 0) + Number(stats.ox || 0) + 
                    Number(stats.fd || 0) + Number(stats.wt || 0) + Number(stats.ml || 0) +
                    Number(m.hp || 0) + Number(m.st || 0) + Number(m.ox || 0) + 
                    Number(m.fd || 0) + Number(m.wt || 0) + Number(m.ml || 0);
        return sum > 0 ? sum - 1 : 1;
    }

    const renderStat = (val, mut, isMutated) => {
        const basePart = `<span style="display:inline-block; width:3ch; text-align:right;">${val || 0}</span>`;
        if (!isMutated) return basePart;
        return `${basePart}<span style="opacity: 0.5; margin: 0 4px; color: #aaa;">|</span><span style="color:var(--mut-bg)">${mut || 0}</span>`;
    };

    // ВІДОБРАЖЕННЯ СПИСКУ
    function renderDinoList() {
        const listElement = document.getElementById('dinoList');
        const searchQuery = document.getElementById('searchInput').value.toLowerCase();
        
        // 1. ЗАФІКСУВАТИ ПОЗИЦІЇ (FIRST)
        const positions = new Map();
        Array.from(listElement.children).forEach(el => {
            const name = el.querySelector('.dino-name').innerText;
            positions.set(name, el.getBoundingClientRect().top);
        });
        
        listElement.innerHTML = '';

        // Фільтрація та сортування
        const filteredList = dinoTypes
            .filter(dino => dino.name.toLowerCase().includes(searchQuery))
            .sort((a, b) => {
            if (a.favorite === b.favorite) return a.name.localeCompare(b.name);
            return a.favorite ? -1 : 1;
        });

        filteredList.forEach((dino) => {
            const realIdx = dinoTypes.indexOf(dino);
            const item = document.createElement('div');
            item.className = `dino-item${realIdx === selectedDinoIndex ? ' selected' : ''}${dino.favorite ? ' is-favorite' : ''}`;
            item.dataset.idx = realIdx; // Додаємо індекс для пошуку елемента при видаленні
            
            const starIcon = dino.favorite 
                ? `<svg class="fav-star" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>` 
                : '';

            item.innerHTML = `
                <span class="dino-name">${starIcon}<span class="dino-name-text">${dino.name}</span></span>
                <div class="dino-actions">
                    <button class="action-btn btn-edit" onclick="openTypeModal(${realIdx})" title="Edit Name">
                        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                    </button>
                </div>
            `;
            // Add click handler to select the item
            item.onclick = (e) => {
                // Не змінюємо вибір, якщо натиснуто кнопку дії (fav/edit/del)
                if (e.target.closest('.action-btn')) return;
                selectDinoType(realIdx);
            };
            listElement.appendChild(item);
        });

        // 2. АНІМАЦІЯ ПЕРЕМІЩЕННЯ (LAST, INVERT, PLAY)
        requestAnimationFrame(() => {
            Array.from(listElement.children).forEach(el => {
                const name = el.querySelector('.dino-name').innerText;
                const oldTop = positions.get(name);
                
                if (oldTop !== undefined) {
                    const newTop = el.getBoundingClientRect().top;
                    const delta = oldTop - newTop;
                    
                    if (delta !== 0) {
                        // Повертаємо елемент на стару позицію без анімації
                        el.style.transition = 'none';
                        el.style.transform = `translateY(${delta}px)`;
                        
                        // Запускаємо плавний перехід до нової позиції
                        requestAnimationFrame(() => {
                            el.style.transition = ''; // Повертаємо CSS transition
                            el.style.transform = '';
                        });
                    }
                }
            });
        });

        // Оновлюємо робочу зону (картки істот)
        renderCreatures();
    }

    function selectDinoType(idx) {
        selectedDinoIndex = idx;
        renderDinoList();
    }

    function renderCreatures() {
        const empty = document.getElementById('emptyState');
        const active = document.getElementById('activeContent');
        const fab = document.getElementById('fabAdd');
        const grid = document.getElementById('creaturesGrid');

        if (selectedDinoIndex === -1) {
            empty.style.display = 'flex';
            active.style.display = 'none';
            fab.style.display = 'none';
            return;
        }

        const type = dinoTypes[selectedDinoIndex];
        empty.style.display = 'none';
        active.style.display = 'block';
        fab.style.display = 'flex'; // Кнопка "+" тепер з'являється
        document.getElementById('selectedTypeName').innerText = type.name;

        // 1. Розрахунок поколінь
        const creatureLevels = {};
        function getCreatureLevel(cId) {
            if (!cId) return 0;
            if (creatureLevels[cId] !== undefined) return creatureLevels[cId];
            const c = type.creatures.find(x => x.id == cId);
            if (!c || (!c.motherId && !c.fatherId)) return creatureLevels[cId] = 0;
            const mLevel = getCreatureLevel(c.motherId);
            const fLevel = getCreatureLevel(c.fatherId);
            return creatureLevels[cId] = Math.max(mLevel, fLevel) + 1;
        }

        type.creatures.forEach(c => getCreatureLevel(c.id));

        // 2. Ггрупування за поколіннями
        const generations = {};
        type.creatures.forEach(c => {
            const gen = creatureLevels[c.id];
            if (!generations[gen]) generations[gen] = [];
            generations[gen].push(c);
        });

        const getCreatureNameById = (id) => {
            if (!id) return null;
            const found = type.creatures.find(cr => cr.id == id);
            return found ? found.name : 'Unknown';
        };

        grid.innerHTML = '<svg id="connectors-svg"></svg>';
        
        Object.keys(generations).sort((a,b) => a-b).forEach(gen => {
            const row = document.createElement('div');
            row.className = 'generation-row';
            row.innerHTML = `<div class="gen-label">GENERATION ${gen}</div>`;
            
            generations[gen].forEach(c => {
                const idx = type.creatures.indexOf(c);
                const lvl = calculateLvl(c.stats, c.muts);
                const motherName = getCreatureNameById(c.motherId);
                const fatherName = getCreatureNameById(c.fatherId);

                const parentsHtml = (motherName || fatherName) ? 
                    `<div class="card-parents-info">M: <span class="parent-link" onclick="scrollToCreature('${c.motherId}')">${motherName || '—'}</span> | F: <span class="parent-link" onclick="scrollToCreature('${c.fatherId}')">${fatherName || '—'}</span></div>` : 
                    '<div class="card-parents-info" style="opacity:0">No parents</div>';

                row.innerHTML += `
                    <div class="creature-card" data-id="${c.id}" data-m="${c.motherId || ''}" data-f="${c.fatherId || ''}"
                         onmouseenter="highlightLineage(this)" onmouseleave="clearLineage()">
                        <div class="card-actions-vertical">
                            <button class="card-edit-btn" onclick="openModal(${idx})" title="Edit Creature">
                                <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                            </button>
                        </div>
                        <div class="card-gender-strip" style="background:${c.gender === 'M' ? 'var(--male)' : 'var(--female)'}"></div>
                        <span class="card-name"><span class="card-name-text">${c.name}</span>${c.mut ? '<span class="card-mut-badge">MUT</span>' : ''}</span>
                        <div class="card-level-info">LVL ${lvl} <span style="margin: 0 4px; opacity: 0.5;">|</span> MAX ${lvl + 88}</div>
                        ${parentsHtml}
                        <div class="card-stats-mini">
                            <div class="stat-row"><span class="stat-label">HP</span><span class="card-stat-val">${renderStat(c.stats.hp, c.muts?.hp, c.mut)}</span><span class="stat-label second-col-label">ST</span><span class="card-stat-val">${renderStat(c.stats.st, c.muts?.st, c.mut)}</span></div>
                            <div class="stat-row"><span class="stat-label">OX</span><span class="card-stat-val">${renderStat(c.stats.ox, c.muts?.ox, c.mut)}</span><span class="stat-label second-col-label">FD</span><span class="card-stat-val">${renderStat(c.stats.fd, c.muts?.fd, c.mut)}</span></div>
                            <div class="stat-row"><span class="stat-label">WT</span><span class="card-stat-val">${renderStat(c.stats.wt, c.muts?.wt, c.mut)}</span><span class="stat-label second-col-label">ML</span><span class="card-stat-val">${renderStat(c.stats.ml, c.muts?.ml, c.mut)}</span></div>
                        </div>
                    </div>`;
            });
            grid.appendChild(row);
        });

        setTimeout(drawConnectors, 100); // Даємо час на рендер перед малюванням ліній
    }

    function drawConnectors() {
        const svg = document.getElementById('connectors-svg');
        if (!svg) return;
        const grid = document.getElementById('creaturesGrid');
        svg.innerHTML = '';
        const rect = grid.getBoundingClientRect();
        svg.setAttribute('viewBox', `0 0 ${rect.width} ${rect.height}`);

        document.querySelectorAll('.creature-card').forEach(child => {
            const cRect = child.getBoundingClientRect();
            const parents = [
                {id: child.dataset.m, color: 'rgba(245, 61, 134, 0.4)'},
                {id: child.dataset.f, color: 'rgba(61, 134, 245, 0.4)'}
            ];

            parents.forEach(p => {
                if (!p.id) return;
                const parent = document.querySelector(`.creature-card[data-id="${p.id}"]`);
                if (!parent) return;
                const pRect = parent.getBoundingClientRect();

                const x1 = (pRect.left + pRect.width / 2) - rect.left;
                const y1 = pRect.bottom - rect.top;
                const x2 = (cRect.left + cRect.width / 2) - rect.left;
                const y2 = cRect.top - rect.top;

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                const cp = (y2 - y1) / 2;
                path.setAttribute('d', `M ${x1} ${y1} C ${x1} ${y1 + cp}, ${x2} ${y2 - cp}, ${x2} ${y2}`);
                path.setAttribute('stroke', p.color);
                path.setAttribute('stroke-width', '2');
                path.setAttribute('fill', 'none');
                svg.appendChild(path);
            });
        });
    }

    // Візуалізація зв'язків
    function highlightLineage(card) {
        const id = card.dataset.id;
        const mId = card.dataset.m;
        const fId = card.dataset.f;

        document.querySelectorAll('.creature-card').forEach(c => {
            const cId = c.dataset.id;
            const cM = c.dataset.m;
            const cF = c.dataset.f;

            if (cId === mId) c.classList.add('highlight-mother');
            if (cId === fId) c.classList.add('highlight-father');
            if (cM === id || cF === id) c.classList.add('highlight-child');
        });
    }

    function clearLineage() {
        document.querySelectorAll('.creature-card').forEach(c => {
            c.classList.remove('highlight-mother', 'highlight-father', 'highlight-child');
        });
    }

    function scrollToCreature(id) {
        if (!id || id === 'null') return;
        const target = document.querySelector(`.creature-card[data-id="${id}"]`);
        if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            target.style.transition = '0.3s';
            target.style.borderColor = 'var(--accent)';
            setTimeout(() => target.style.borderColor = '', 1000);
        }
    }

    function saveCreature() {
        if (selectedDinoIndex === -1) return;
        const type = dinoTypes[selectedDinoIndex];

        const creature = {
            id: editingCreatureIdx === -1 ? Date.now() : type.creatures[editingCreatureIdx].id,
            name: document.getElementById('m-name').value || "Unnamed",
            motherId: document.getElementById('m-mother').value || null,
            fatherId: document.getElementById('m-father').value || null,
            gender: document.getElementById('bm').classList.contains('active-m') ? 'M' : 'F',
            mut: document.getElementById('m-mut').checked,
            stats: {
                hp: document.getElementById('s-hp').value,
                st: document.getElementById('s-st').value,
                ox: document.getElementById('s-ox').value,
                fd: document.getElementById('s-fd').value,
                wt: document.getElementById('s-wt').value,
                ml: document.getElementById('s-ml').value
            },
            muts: {
                hp: document.getElementById('s-hp-m').value,
                st: document.getElementById('s-st-m').value,
                ox: document.getElementById('s-ox-m').value,
                fd: document.getElementById('s-fd-m').value,
                wt: document.getElementById('s-wt-m').value,
                ml: document.getElementById('s-ml-m').value
            }
        };

        if (editingCreatureIdx === -1) {
            type.creatures.push(creature);
        } else {
            type.creatures[editingCreatureIdx] = creature;
        }
        
        saveToStorage();
        renderCreatures();
        closeModal();
        resetCreatureForm();
    }

    function resetCreatureForm() {
        document.getElementById('m-name').value = '';
        document.getElementById('m-mut').checked = false;
        document.getElementById('m-mother').value = '';
        document.getElementById('m-father').value = '';
        setGender('M');
        document.querySelectorAll('.stat-input').forEach(input => input.value = '');
    }

    // ЛОГІКА SIDEBAR
    function toggleSearch() {
        const bar = document.getElementById('searchBar');
        const isActive = bar.classList.contains('active');
        
        if (!isActive) {
            bar.classList.add('active');
            setTimeout(() => document.getElementById('searchInput').focus(), 100);
        } else {
            closeSearch();
        }
    }

    function closeSearch() {
        const bar = document.getElementById('searchBar');
        if (bar.classList.contains('active')) {
            bar.classList.remove('active');
            document.getElementById('searchInput').value = '';
            renderDinoList(); // Повертаємо повний список при закритті
        }
    }

    let currentModalFav = false;

    function openTypeModal(idx = -1) {
        editingIdx = idx;
        const isEdit = idx !== -1;
        document.getElementById('typeModalTitle').innerText = isEdit ? "EDIT TYPE NAME" : "NEW DINO TYPE";
        
        // Показуємо кнопку видалення тільки якщо це редагування
        const delBtn = document.getElementById('modalDeleteBtn');
        if (delBtn) delBtn.style.display = isEdit ? 'block' : 'none';

        currentModalFav = isEdit ? dinoTypes[idx].favorite : false;
        updateModalFavUI();

        document.getElementById('newTypeName').value = isEdit ? dinoTypes[idx].name : '';
        document.getElementById('typeModal').classList.add('active');
        setTimeout(() => document.getElementById('newTypeName').focus(), 100);
    }

    function toggleModalFav() {
        currentModalFav = !currentModalFav;
        updateModalFavUI();
    }

    function updateModalFavUI() {
        const star = document.querySelector('#modalFavBtn svg');
        star.style.fill = currentModalFav ? '#fdd835' : '#777';
    }

    function closeTypeModal() { document.getElementById('typeModal').classList.remove('active'); }

    function submitNewType() {
        const nameInput = document.getElementById('newTypeName');
        const name = nameInput.value.trim();
        
        if (name) {
            if (editingIdx === -1) {
                // Створення нового
                dinoTypes.push({ name: name, favorite: currentModalFav, creatures: [] });
                selectedDinoIndex = dinoTypes.length - 1;
            } else {
                // Редагування існуючого
                dinoTypes[editingIdx].name = name;
                dinoTypes[editingIdx].favorite = currentModalFav;
            }
            saveToStorage();
            renderDinoList();
            closeTypeModal();
        }
    }

    function handleModalDelete() {
        if (editingIdx !== -1) {
            confirmDeleteType(editingIdx);
            closeTypeModal();
        }
    }

    // ЛОГІКА ПІДТВЕРДЖЕННЯ
    function showConfirm(message, onOk) {
        const modal = document.getElementById('confirmModal');
        document.getElementById('confirmMessage').innerText = message;
        modal.classList.add('active');
        document.getElementById('confirmOkBtn').onclick = () => {
            onOk();
            modal.classList.remove('active');
        };
    }

    function closeConfirmModal() { document.getElementById('confirmModal').classList.remove('active'); }

    function confirmDeleteType(idx) {
        const name = dinoTypes[idx].name;
        showConfirm(`Delete ${name}?`, () => {
            const element = document.querySelector(`.dino-item[data-idx="${idx}"]`);
            
            if (element) {
                element.classList.add('removing');
                setTimeout(() => {
                    const actualIdx = dinoTypes.findIndex(t => t.name === name);
                    if (actualIdx !== -1) dinoTypes.splice(actualIdx, 1);
                    if (selectedDinoIndex === idx) selectedDinoIndex = -1;
                    saveToStorage();
                    renderDinoList();
                }, 250);
            } else {
                // Якщо елемент не знайдено (наприклад, при активному пошуку), видаляємо миттєво
                dinoTypes.splice(idx, 1);
                if (selectedDinoIndex === idx) selectedDinoIndex = -1;
                saveToStorage();
                renderDinoList();
            }
        });
    }

    // МОДАЛКА
    function openModal(creatureIdx = -1) { 
        editingCreatureIdx = creatureIdx;
        const isEdit = creatureIdx !== -1;
        
        const modal = document.getElementById('modal');
        const title = modal.querySelector('.modal-header h2');
        title.innerText = isEdit ? "EDIT DINO CARD" : "NEW DINO CARD";

        // Оновлення списків батьків
        const type = dinoTypes[selectedDinoIndex];
        const motherSelect = document.getElementById('m-mother');
        const fatherSelect = document.getElementById('m-father');
        motherSelect.innerHTML = '<option value="">None</option>';
        fatherSelect.innerHTML = '<option value="">None</option>';

        const currentId = isEdit ? type.creatures[creatureIdx].id : null;
        type.creatures.forEach(cr => {
            if (cr.id === currentId) return; // Не можна бути батьком самому собі
            const opt = `<option value="${cr.id}">${cr.name}</option>`;
            if (cr.gender === 'F') motherSelect.innerHTML += opt;
            if (cr.gender === 'M') fatherSelect.innerHTML += opt;
        });

        if (isEdit) {
            const c = type.creatures[creatureIdx];
            document.getElementById('m-name').value = c.name;
            document.getElementById('m-mother').value = c.motherId || '';
            document.getElementById('m-father').value = c.fatherId || '';
            document.getElementById('m-mut').checked = c.mut;
            setGender(c.gender);
            document.getElementById('s-hp').value = c.stats.hp;
            document.getElementById('s-st').value = c.stats.st;
            document.getElementById('s-ox').value = c.stats.ox;
            document.getElementById('s-fd').value = c.stats.fd;
            document.getElementById('s-wt').value = c.stats.wt;
            document.getElementById('s-ml').value = c.stats.ml;
            const m = c.muts || {};
            document.getElementById('s-hp-m').value = m.hp || 0;
            document.getElementById('s-st-m').value = m.st || 0;
            document.getElementById('s-ox-m').value = m.ox || 0;
            document.getElementById('s-fd-m').value = m.fd || 0;
            document.getElementById('s-wt-m').value = m.wt || 0;
            document.getElementById('s-ml-m').value = m.ml || 0;
        } else {
            resetCreatureForm();
        }

        document.getElementById('modal').classList.add('active'); 
    }

    function closeModal() { 
        document.getElementById('modal').classList.remove('active'); 
    }

    function setGender(g) {
        document.getElementById('bm').className = g === 'M' ? 'gen-btn active-m' : 'gen-btn';
        document.getElementById('bf').className = g === 'F' ? 'gen-btn active-f' : 'gen-btn';
    }

    function confirmDelete() { 
        if (editingCreatureIdx === -1) {
            closeModal();
            return;
        }
        showConfirm("Delete this record?", () => {
            dinoTypes[selectedDinoIndex].creatures.splice(editingCreatureIdx, 1);
            saveToStorage();
            renderCreatures();
            closeModal();
        });
    }

    // Реєстрація Service Worker для PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => {
                console.log('SW registration failed: ', err);
            });
        });
    }

    // Гарячі клавіші для модалки типу
    document.getElementById('newTypeName').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') submitNewType();
        if (e.key === 'Escape') closeTypeModal();
    });

    // Закриття пошуку при кліку поза ним
    document.addEventListener('click', (e) => {
        const bar = document.getElementById('searchBar');
        const toggleBtn = document.querySelector('.add-type-btn[onclick="toggleSearch()"]');
        
        if (bar.classList.contains('active') && !bar.contains(e.target) && !toggleBtn.contains(e.target)) {
            closeSearch();
        }
    });

    // СТАРТ
    loadFromStorage();
    renderDinoList();

    // Перемальовувати лінії при зміні розміру
    window.addEventListener('resize', drawConnectors);
</script>

</body>
</html>
