<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f0f12">
    <link rel="manifest" href="manifest.json">
    <title>ARK Breeding Professional UI</title>
    <style>
        html {
            width: 100%;
            height: 100%;
        }

        :root {
            --bg: #0f0f12;
            --surface: #1e1e24;
            --accent: #ffb74d; 
            --male: #3d86f5;   
            --female: #f53d86; 
            --mut-bg: #4caf50; 
            --delete: #ff5252;
            --input-bg: #2d2d35;
            --sidebar-w: 25%;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: #e0e0e0; 
            margin: 0; 
            display: flex;
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* БІЧНЕ МЕНЮ (SIDEBAR) */
        .sidebar {
            width: var(--sidebar-w);
            min-width: 280px; /* Гарантує мінімальний простір для назв */
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0; top: 0;
        }

        .sidebar-header {
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar-header h1 {
            font-size: 1.1rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: 1px;
            color: #fff;
        }

        .add-type-btn {
            background: var(--accent);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .add-type-btn:hover { transform: scale(1.1); }
        .add-type-btn svg { width: 26px; height: 26px; fill: #000; transition: fill 0.2s; }

        .add-type-btn.secondary {
            background: var(--input-bg);
        }
        .add-type-btn.secondary svg {
            fill: #888;
        }
        .add-type-btn.secondary:hover {
            background: #363640;
        }
        .add-type-btn.secondary:hover svg {
            fill: #fff;
        }

        .dino-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* Плавна прокрутка для iOS/iPadOS */
            padding: 15px 15px 20px 15px; /* Додано значний відступ знизу для комфортної прокрутки */
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* Internet Explorer 10+ */
        }

        .dino-list::-webkit-scrollbar {
            display: none; /* WebKit (Chrome, Safari, Edge) */
        }

        .sidebar-footer {
            padding: 0 15px 15px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar-tool-row {
            display: flex;
            gap: 10px;
        }

        .sidebar-tool-btn {
            flex: 1;
            min-height: 42px;
            border: none;
            border-radius: 12px;
            background: var(--input-bg);
            color: #fff;
            font-weight: 800;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s, color 0.2s;
        }

        .sidebar-tool-btn:hover {
            transform: translateY(-1px);
            background: #363640;
        }

        .sidebar-tool-btn.primary {
            background: var(--accent);
            color: #000;
        }

        .sidebar-tool-btn.primary:hover {
            background: #ffc96f;
        }

        .sidebar-import-input {
            display: none;
        }

        .dino-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 1rem;
            background: var(--input-bg);
            border-radius: 1.1rem;
            margin-bottom: 0.5rem;
            transition: transform 0.4s cubic-bezier(0.2, 0, 0, 1), opacity 0.3s, background 0.2s, border 0.2s;
            height: 3.8rem; /* Фіксована висота запобігає стрибкам інтерфейсу при зникненні кнопок */
            box-sizing: border-box; /* Дозволяє рамці не змінювати внутрішні розміри */
        }
        .dino-item.selected {
            border: 0.15rem solid var(--accent); /* Orange border */
            /* Паддінг тепер не потрібно змінювати вручну завдяки box-sizing */
        }
        .dino-item:hover { background: #363640; }

        /* Колір тексту для улюблених елементів */
        .dino-item.is-favorite .dino-name {
            color: var(--accent);
        }

        /* Анімація видалення */
        .dino-item.removing {
            opacity: 0;
            transform: translateX(-20px);
            pointer-events: none;
        }

        .dino-name {
            flex: 1;
            font-weight: 600;
            font-size: 0.9rem;
            color: #fff;
            display: flex;
            align-items: center;
            overflow: hidden;
            margin-right: 10px;
        }
        
        .dino-name-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .fav-star {
            width: 14px;
            height: 14px;
            fill: var(--accent);
            margin-right: 6px;
            flex-shrink: 0;
        }

        .dino-actions { display: flex; gap: 4px; }

        .action-btn {
            background: none;
            border: none;
            padding: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: 0.2s;
        }
        .action-btn svg { width: 18px; height: 18px; fill: #777; }
        
        .btn-edit:hover svg { fill: var(--accent); }

        .btn-modal-fav {
            width: 48px; height: 48px;
            background: var(--input-bg);
            border: none; border-radius: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .btn-modal-fav:hover { transform: scale(1.05); }

        /* СТИЛІ ПОШУКУ З АНІМАЦІЄЮ */
        #searchBar {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            padding: 0 1.5rem;
            transition: all 0.3s ease-in-out;
        }
        #searchBar.active {
            max-height: 100px; /* Достатньо для поля вводу */
            opacity: 1;
            padding: 0 1.5rem 1rem 1.5rem;
        }

        /* ОСНОВНИЙ КОНТЕНТ */
        .main-content {
            margin-left: max(var(--sidebar-w), 280px); /* Синхронізація з min-width сайдбару */
            flex: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .content-header {
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            justify-content: space-between;
        }

        .content-header h2 { font-size: 2rem; font-weight: 900; margin: 0; text-transform: uppercase; color: #fff; }

        /* СІТКА КАРТОК */
        .creatures-grid {
            display: flex;
            flex-direction: column;
            gap: 3rem;
            width: 100%;
            position: relative;
            padding-top: 1rem;
        }

        .generation-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            padding: 2rem 0;
            border-top: 1px dashed rgba(255,255,255,0.1);
            position: relative;
        }

        .gen-label {
            position: absolute;
            top: -10px; left: 0;
            background: var(--bg);
            padding: 0 10px;
            color: var(--accent);
            font-size: 0.7rem;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .creature-card {
            background: var(--surface);
            border-radius: 1.5rem;
            /* Коригуємо паддінг: віднімаємо 2px, щоб компенсувати збільшення рамки з 1px до 3px */
            padding: calc(1.2rem - 2px) calc(64px - 2px) calc(1.2rem - 2px) calc(2.2rem - 2px); 
            border: 3px solid rgba(255,255,255,0.05); /* Рамка завжди 3px, щоб уникнути тремтіння */
            transition: 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            width: 230px; 
            z-index: 2;
        }
        .creature-card:hover { border-color: var(--accent); z-index: 10; }

        /* Стилі підсвічування зв'язків */
        .creature-card.is-selected {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 1px rgba(255, 183, 77, 0.95), 0 0 15px rgba(255, 183, 77, 0.35), 0 0 15px rgba(255, 183, 77, 0.14);
            z-index: 14;
        }
        .creature-card.highlight-mother {
            border-color: var(--female) !important;
            box-shadow: 0 0 0 1px rgba(245, 61, 134, 0.9), 0 0 15px rgba(245, 61, 134, 0.35), 0 0 15cqh rgba(245, 61, 134, 0.12);
            z-index: 10;
        }
        .creature-card.highlight-father {
            border-color: var(--male) !important;
            box-shadow: 0 0 0 1px rgba(61, 134, 245, 0.9), 0 0 15px rgba(61, 134, 245, 0.35), 0 0 15px rgba(61, 134, 245, 0.12);
            z-index: 10;
        }
        .creature-card.highlight-child {
            border-color: var(--mut-bg) !important;
            box-shadow: 0 0 0 1px rgba(46, 199, 51, 0.915), 0 0 15px rgba(76, 175, 80, 0.28);
            z-index: 10;
        }
        
        .parent-link { cursor: pointer; transition: 0.2s; }
        .parent-link:hover { color: #fff; text-decoration: underline; }

        .card-gender-strip {
            position: absolute;
            inset: 0;
            border-radius: calc(1.5rem - 3px);
            padding: 4px;
            box-sizing: border-box;
            pointer-events: none;
            mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }
        .card-name { 
            font-weight: 900; 
            font-size: 1.1rem; 
            margin-bottom: 2px; 
            display: flex; 
            align-items: center;
            overflow: hidden;
        }
        .card-name-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 0 1 auto;
        }
        .card-level-info { font-size: 0.75rem; font-weight: 800; color: #aaa; margin-bottom: 2px; text-transform: uppercase; white-space: nowrap; }
        .card-parents-info { font-size: 0.65rem; color: #666; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-stats-mini { display: flex; flex-direction: column; gap: 0.4rem; font-size: 0.75rem; color: #888; }
        
        .stat-row {
            display: flex;
            align-items: baseline;
            padding-left: 2%; 
        }
        
        .stat-label {
            font-weight: bold;
            color: #888;
            width: 3ch; /* Optimized for 2-letter names */
            flex-shrink: 0;
        }
        
        .card-stat-val {
            color: var(--accent);
            font-weight: bold;
            width: 7ch; /* Increased slightly for aligned "XXX | XX" */
            text-align: left;
            flex-shrink: 0;
            white-space: nowrap;
        }
        
        .second-col-label { margin-left: 0.5rem; } 

        .card-actions-vertical {
            position: absolute;
            top: 10px; 
            right: 12px; /* Offset from right edge as requested */
            display: flex;
            flex-direction: column;
            gap: 5px; /* Space between buttons */
            z-index: 2;
        }
        .card-edit-btn { /* This will be a child of card-actions-vertical */
            background: var(--input-bg);
            border: none;
            border-radius: 12px;
            padding: 9px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            opacity: 1; transition: opacity 0.2s;
        }
        .card-edit-btn svg { width: 21px; height: 21px; fill: #777; }
        .card-edit-btn:hover svg { fill: var(--accent); }

        .card-mut-badge { 
            background: var(--mut-bg); 
            color: #000; 
            font-size: 0.65rem; 
            padding: 2px 8px; 
            border-radius: 6px; 
            font-weight: 900; 
            margin-left: 6px; 
            flex-shrink: 0; 
        }

        /* SVG Шар для зв'язків */
        #connectors-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* МОДАЛЬНІ ВІКНА */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; 
            display: flex;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s;
        }
        .modal.active { opacity: 1; visibility: visible; }

        .modal-content { 
            background: var(--surface); 
            width: 95%; max-width: 400px; 
            border-radius: 2rem; 
            padding: 1.2rem; 
            box-sizing: border-box;
            max-height: 90vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* Плавна прокрутка для модального вікна */
            position: relative; 
            transform: scale(0.9) translateY(20px);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
            scrollbar-width: none; /* Firefox */
        }
        .modal-content::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Edge */
        }
        .modal.active .modal-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .close-modal {
            position: absolute;
            top: 20px; right: 20px;
            width: 36px; height: 36px;
            background: var(--input-bg);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .close-modal svg { width: 20px; height: 20px; fill: #888; }
        .close-modal:hover { background: #363640; }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .modal-header h2 { margin: 0; font-weight: 900; font-size: 1.4rem; }
        
        .btn-text-del {
            background: none;
            border: none;
            color: var(--delete);
            font-weight: 900;
            font-size: 0.75rem;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 1px;
            padding: 5px;
            transition: 0.2s;
        }
        .btn-text-del:hover { opacity: 0.7; }

        .input-tile { 
            background: var(--input-bg); border-radius: 1.2rem; 
            padding: 0.6rem 1.1rem; margin-bottom: 0.5rem; 
        }
        .tile-label { font-size: 0.7rem; color: #888; font-weight: 900; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .input-main { background: none; border: none; color: #fff; font-size: 1.1rem; font-weight: bold; outline: none; width: 100%; }

        .action-row-combined { display: flex; gap: 0.6rem; margin-bottom: 1rem; width: 100%; }
        
        .gen-btn {
            flex: 1; min-height: 38px; border-radius: 1.1rem; border: none;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1rem; background: var(--input-bg); color: #888; cursor: pointer;
        }
        .gen-btn.active-m { background: var(--male); color: #000; }
        .gen-btn.active-f { background: var(--female); color: #000; }

        .mut-tile { 
            flex: 2; min-height: 38px; border-radius: 1.1rem; 
            display: flex; align-items: center; justify-content: space-around;
            background: var(--mut-bg); color: white; padding: 0 12px; font-weight: 900;
        }

        .switch { position: relative; width: 38px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); transition: .3s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #999; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #fff; }
        input:checked + .slider:before { transform: translateX(16px); background-color: var(--mut-bg); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-bottom: 1rem; }
        .stat-tile { background: var(--input-bg); border-radius: 1rem; padding: 0.5rem 1rem; display: flex; align-items: center; justify-content: space-between; }
        .stat-name { font-weight: 900; color: #888; font-size: 0.75rem; }
        .stat-input { background: none; border: none; color: var(--accent); font-size: 1.1rem; font-weight: 900; width: 60px; text-align: right; outline: none; }
        
        .stat-input::-webkit-outer-spin-button,
        .stat-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .stat-input[type=number] { appearance: textfield; -moz-appearance: textfield; }

        .actions-row { display: flex; gap: 0.6rem; }
        .btn-save { flex: 2; min-height: 42px; background: var(--accent); color: #000; border: none; border-radius: 1.2rem; font-weight: 900; cursor: pointer; }
        .btn-del { flex: 1; min-height: 42px; background: var(--delete); color: #000; border: none; border-radius: 1.2rem; font-weight: 900; cursor: pointer; }

        .fab-add { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: var(--accent); border-radius: 22px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }

        .mobile-back-btn {
            display: none;
            align-items: center;
            gap: 8px;
            min-height: 42px;
            padding: 0 14px;
            border: none;
            border-radius: 12px;
            background: var(--input-bg);
            color: #fff;
            font-weight: 800;
            cursor: pointer;
        }

        @media (max-width: 767px) {
            body.mobile-phone {
                display: block;
                overflow: hidden;
                height: 100dvh;
            }

            body.mobile-phone .sidebar {
                width: 100%;
                min-width: 0;
                height: 100dvh;
                position: fixed;
                inset: 0;
                z-index: 20;
            }

            body.mobile-phone .main-content {
                margin-left: 0;
                padding: 1rem;
                width: 100%;
                height: 100dvh;
                box-sizing: border-box;
                display: none;
                position: fixed;
                inset: 0;
                overflow-y: auto;
                z-index: 30;
                background: var(--bg);
            }

            body.mobile-phone.mobile-card-view .sidebar {
                display: none;
            }

            body.mobile-phone.mobile-card-view .main-content {
                display: flex;
                flex-direction: column;
            }

            body.mobile-phone.mobile-card-view #activeContent {
                display: block !important;
            }

            body.mobile-phone.mobile-card-view #emptyState {
                display: none !important;
            }

            body.mobile-phone .content-header {
                margin-bottom: 1rem;
            }

            body.mobile-phone .content-header h2 {
                font-size: 1.4rem;
            }

            body.mobile-phone .mobile-back-btn {
                display: inline-flex;
            }

            body.mobile-phone .creatures-grid {
                gap: 1rem;
                padding-top: 0.5rem;
            }

            body.mobile-phone .generation-row {
                gap: 0.75rem;
                padding: 1.25rem 0;
            }

            body.mobile-phone .creature-card {
                width: calc((100% - 0.75rem) / 2);
                max-width: calc((100% - 0.75rem) / 2);
                padding: calc(1rem - 2px) calc(2.2rem - 2px) calc(1rem - 2px) calc(1rem - 2px);
            }

            body.mobile-phone .card-actions-vertical {
                right: 8px;
                gap: 4px;
            }

            body.mobile-phone .card-edit-btn {
                padding: 7px;
            }

            body.mobile-phone .fab-add {
                right: 16px;
                bottom: 16px;
            }
        }

    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h1>DINO</h1>
        <div style="display: flex; gap: 8px;">
            <button type="button" class="add-type-btn secondary" id="fullscreenBtn" onclick="toggleFullscreen()" title="Fullscreen">
                <svg id="fullscreenIcon" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
            </button>
            <button type="button" class="add-type-btn secondary" onclick="exportData()" title="Export">
                <svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zm0-10h4v6h6v-6h4l-7-7-7 7z"/></svg>
            </button>
            <button type="button" class="add-type-btn secondary" onclick="document.getElementById('sidebarImportInput').click()" title="Import">
                <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-14 9h14v2H5v-2z"/></svg>
            </button>
            <button type="button" class="add-type-btn secondary" onclick="toggleSearch()" title="Search">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </button>
            <button type="button" class="add-type-btn" onclick="openTypeModal()" title="Add New">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </button>
        </div>
    </div>
    <div id="searchBar">
        <input type="text" id="searchInput" class="input-main" placeholder="Search..." oninput="renderDinoList()" 
               style="font-size: 0.9rem; border-bottom: 1px solid var(--accent); border-radius: 0; padding-bottom: 5px;">
    </div>
    <div class="dino-list" id="dinoList"></div>
    <input id="sidebarImportInput" class="sidebar-import-input" type="file" accept="application/json,.json">
</div>

<div class="main-content">

            <button id="confirmOkBtn" class="btn-save" style="background: var(--delete);">DELETE</button>
            <button class="btn-del" style="background: var(--input-bg); color: #888; flex: 1;" onclick="closeConfirmModal()">CANCEL</button>
        </div>
    </div>

<script>
    // ДАНІ
    const STORAGE_KEY = 'ark_breeding_pro_v1';
    let selectedDinoId = null;
    let selectedCreatureId = null;
    let previewCreatureId = null;
    let editingTypeId = null; // null = створення, інакше = ID редагування
    let editingCreatureId = null; // ID особини для редагування

    let dinoTypes = [];

    // ФУНКЦІЇ ЗБЕРЕЖЕННЯ
    function saveToStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            selectedDinoId,
            dinoTypes
        }));
    }

    function getDinoTypeById(typeId) {
        return dinoTypes.find(type => type.id == typeId) || null;
    }

    function getDinoTypeIndexById(typeId) {
        return dinoTypes.findIndex(type => type.id == typeId);
    }

    function getNextDinoTypeId() {
        return dinoTypes.reduce((maxId, type) => {
            const typeId = Number(type.id);
            return Number.isFinite(typeId) && typeId > maxId ? typeId : maxId;
        }, 0) + 1;
    }

    function getCreatureById(type, creatureId) {
        return type.creatures.find(creature => creature.id == creatureId) || null;
    }

    function getNextCreatureId(type) {
        return type.creatures.reduce((maxId, creature) => {
            const creatureId = Number(creature.id);
            return Number.isFinite(creatureId) && creatureId > maxId ? creatureId : maxId;
        }, 0) + 1;
    }

    function normalizeCreature(creature, fallbackId) {
        const normalizedId = Number.isFinite(Number(creature?.id)) ? Number(creature.id) : fallbackId;
        return {
            id: normalizedId,
            name: creature?.name || 'Unnamed',
            motherId: creature?.motherId || null,
            fatherId: creature?.fatherId || null,
            gender: creature?.gender === 'F' ? 'F' : 'M',
            mut: !!creature?.mut,
            stats: {
                hp: creature?.stats?.hp ?? '',
                st: creature?.stats?.st ?? '',
                ox: creature?.stats?.ox ?? '',
                fd: creature?.stats?.fd ?? '',
                wt: creature?.stats?.wt ?? '',
                ml: creature?.stats?.ml ?? ''
            },
            muts: {
                hp: creature?.muts?.hp ?? '',
                st: creature?.muts?.st ?? '',
                ox: creature?.muts?.ox ?? '',
                fd: creature?.muts?.fd ?? '',
                wt: creature?.muts?.wt ?? '',
                ml: creature?.muts?.ml ?? ''
            }
        };
    }

    function normalizeDinoType(type) {
        const normalizedType = {
            id: Number.isFinite(Number(type?.id)) ? Number(type.id) : null,
            name: type?.name || 'Unnamed',
            favorite: !!type?.favorite,
            creatures: []
        };
        const creatures = Array.isArray(type?.creatures) ? type.creatures : [];
        let nextCreatureId = 1;
        const usedCreatureIds = new Set();

        creatures.forEach(creature => {
            let creatureId = Number.isFinite(Number(creature?.id)) ? Number(creature.id) : nextCreatureId;
            while (usedCreatureIds.has(creatureId)) {
                creatureId += 1;
            }
            usedCreatureIds.add(creatureId);
            nextCreatureId = Math.max(nextCreatureId, creatureId + 1);
            normalizedType.creatures.push(normalizeCreature({ ...creature, id: creatureId }, creatureId));
        });

        return normalizedType;
    }

    function normalizeDinoTypes(types) {
        const normalizedTypes = [];
        const usedTypeIds = new Set();
        let nextTypeId = 1;

        (Array.isArray(types) ? types : []).forEach(type => {
            let typeId = Number.isFinite(Number(type?.id)) ? Number(type.id) : nextTypeId;
            while (usedTypeIds.has(typeId)) {
                typeId += 1;
            }
            usedTypeIds.add(typeId);
            nextTypeId = Math.max(nextTypeId, typeId + 1);
            normalizedTypes.push(normalizeDinoType({ ...type, id: typeId }));
        });

        return normalizedTypes;
    }

    function loadFromStorage() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (Array.isArray(parsed)) {
                    dinoTypes = normalizeDinoTypes(parsed);
                } else {
                    dinoTypes = normalizeDinoTypes(parsed?.dinoTypes);
                    selectedDinoId = Number.isFinite(Number(parsed?.selectedDinoId)) ? Number(parsed.selectedDinoId) : null;
                }
            } catch (error) {
                dinoTypes = [];
            }
        } else {
            // Початкові дані, якщо сховище порожнє
            dinoTypes = [
                { id: 1, name: "Rex", favorite: true, creatures: [] },
                { id: 2, name: "Argy", favorite: false, creatures: [] }
            ];
        }

        dinoTypes = normalizeDinoTypes(dinoTypes);
        if (selectedDinoId !== null && !getDinoTypeById(selectedDinoId)) {
            selectedDinoId = null;
        }
        if (selectedDinoId === null) {
            selectedDinoId = dinoTypes[0]?.id ?? null;
        }
    }

    function isMobilePhoneLayout() {
        return window.matchMedia('(max-width: 767px)').matches;
    }

    function syncMobileLayout() {
        document.body.classList.toggle('mobile-phone', isMobilePhoneLayout());
        if (!isMobilePhoneLayout()) {
            document.body.classList.remove('mobile-menu-view', 'mobile-card-view');
            return;
        }

        if (!document.body.classList.contains('mobile-menu-view') && !document.body.classList.contains('mobile-card-view')) {
            document.body.classList.add('mobile-menu-view');
        }
    }

    function showMobileMenu() {
        if (!isMobilePhoneLayout()) return;
        document.body.classList.remove('mobile-card-view');
        document.body.classList.add('mobile-menu-view');
        renderDinoList();
    }

    function showMobileCards() {
        if (!isMobilePhoneLayout()) return;
        document.body.classList.remove('mobile-menu-view');
        document.body.classList.add('mobile-card-view');
        renderCreatures();
    }

    // ДОПОМІЖНІ ФУНКЦІЇ ОБЧИСЛЕННЯ
    function calculateLvl(stats, muts) {
        const m = muts || { hp: 0, st: 0, ox: 0, fd: 0, wt: 0, ml: 0 };
        const sum = Number(stats.hp || 0) + Number(stats.st || 0) + Number(stats.ox || 0) + 
                    Number(stats.fd || 0) + Number(stats.wt || 0) + Number(stats.ml || 0) +
                    Number(m.hp || 0) + Number(m.st || 0) + Number(m.ox || 0) + 
                    Number(m.fd || 0) + Number(m.wt || 0) + Number(m.ml || 0);
        return sum > 0 ? sum - 1 : 1;
    }

    const renderStat = (val, mut, isMutated) => {
        const basePart = `<span style="display:inline-block; width:3ch; text-align:right;">${val || 0}</span>`;
        if (!isMutated) return basePart;
        return `${basePart}<span style="opacity: 0.5; margin: 0 4px; color: #aaa;">|</span><span style="color:var(--mut-bg)">${mut || 0}</span>`;
    };

    const getGenderStripStyle = (gender) => {
        if (gender === 'M') {
            return 'background: linear-gradient(135deg, rgba(61, 134, 245, 0.95) 0%, rgba(61, 134, 245, 0.72) 48%, rgba(61, 134, 245, 0.2) 100%); filter: drop-shadow(0 0 10px rgba(61, 134, 245, 0.18));';
        }

        return 'background: linear-gradient(135deg, rgba(245, 61, 134, 0.95) 0%, rgba(245, 61, 134, 0.72) 48%, rgba(245, 61, 134, 0.2) 100%); filter: drop-shadow(0 0 10px rgba(245, 61, 134, 0.18));';
    };

    // ВІДОБРАЖЕННЯ СПИСКУ
    function renderDinoList() {
        syncMobileLayout();
        const listElement = document.getElementById('dinoList');
        const searchQuery = document.getElementById('searchInput').value.toLowerCase();
        
        // 1. ЗАФІКСУВАТИ ПОЗИЦІЇ (FIRST)
        const positions = new Map();
        Array.from(listElement.children).forEach(el => {
            positions.set(el.dataset.id, el.getBoundingClientRect().top);
        });
        
        listElement.innerHTML = '';

        // Фільтрація та сортування
        const filteredList = dinoTypes
            .filter(dino => dino.name.toLowerCase().includes(searchQuery))
            .sort((a, b) => {
            if (a.favorite === b.favorite) return a.name.localeCompare(b.name);
            return a.favorite ? -1 : 1;
        });

        filteredList.forEach((dino) => {
            const typeId = dino.id;
            const item = document.createElement('div');
            item.className = `dino-item${typeId == selectedDinoId ? ' selected' : ''}${dino.favorite ? ' is-favorite' : ''}`;
            item.dataset.id = typeId; // Додаємо ID для стабільного пошуку елемента при видаленні
            
            const starIcon = dino.favorite 
                ? `<svg class="fav-star" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>` 
                : '';

            item.innerHTML = `
                <span class="dino-name">${starIcon}<span class="dino-name-text">${dino.name}</span></span>
                <div class="dino-actions">
                    <button class="action-btn btn-edit" onclick="openTypeModal(${typeId})" title="Edit Name">
                        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                    </button>
                </div>
            `;
            // Add click handler to select the item
            item.onclick = (e) => {
                // Не змінюємо вибір, якщо натиснуто кнопку дії (fav/edit/del)
                if (e.target.closest('.action-btn')) return;
                selectDinoType(typeId);
            };
            listElement.appendChild(item);
        });

        // 2. АНІМАЦІЯ ПЕРЕМІЩЕННЯ (LAST, INVERT, PLAY)
        requestAnimationFrame(() => {
            Array.from(listElement.children).forEach(el => {
                const oldTop = positions.get(el.dataset.id);
                
                if (oldTop !== undefined) {
                    const newTop = el.getBoundingClientRect().top;
                    const delta = oldTop - newTop;
                    
                    if (delta !== 0) {
                        // Повертаємо елемент на стару позицію без анімації
                        el.style.transition = 'none';
                        el.style.transform = `translateY(${delta}px)`;
                        
                        // Запускаємо плавний перехід до нової позиції
                        requestAnimationFrame(() => {
                            el.style.transition = ''; // Повертаємо CSS transition
                            el.style.transform = '';
                        });
                    }
                }
            });
        });

        // Оновлюємо робочу зону (картки істот)
        renderCreatures();
    }

    function selectDinoType(typeId) {
        const type = getDinoTypeById(typeId);
        if (!type) return;
        selectedDinoId = type.id;
        selectedCreatureId = null;
        previewCreatureId = null;
        if (isMobilePhoneLayout()) {
            showMobileCards();
            return;
        }
        renderDinoList();
    }

    function renderCreatures() {
        syncMobileLayout();
        const empty = document.getElementById('emptyState');
        const active = document.getElementById('activeContent');
        const fab = document.getElementById('fabAdd');
        const grid = document.getElementById('creaturesGrid');

        if (isMobilePhoneLayout() && document.body.classList.contains('mobile-menu-view')) {
            empty.style.display = 'none';
            active.style.display = 'none';
            fab.style.display = 'none';
            return;
        }

        let type = getDinoTypeById(selectedDinoId);
        if (!type) {
            selectedDinoId = dinoTypes[0]?.id ?? null;
            type = getDinoTypeById(selectedDinoId);
        }
        if (!type) {
            empty.style.display = 'flex';
            active.style.display = 'none';
            fab.style.display = 'none';
            return;
        }
        empty.style.display = 'none';
        active.style.display = 'block';
        fab.style.display = 'flex'; // Кнопка "+" тепер з'являється
        document.getElementById('selectedTypeName').innerText = type.name;

        // 1. Розрахунок поколінь
        const creatureLevels = {};
        function getCreatureLevel(cId, stack = new Set()) {
            if (!cId) return 0;
            if (creatureLevels[cId] !== undefined) return creatureLevels[cId];
            if (stack.has(cId)) return 0;
            stack.add(cId);
            try {
                const c = type.creatures.find(x => x.id == cId);
                if (!c || (!c.motherId && !c.fatherId)) return creatureLevels[cId] = 0;
                const mLevel = getCreatureLevel(c.motherId, stack);
                const fLevel = getCreatureLevel(c.fatherId, stack);
                return creatureLevels[cId] = Math.max(mLevel, fLevel) + 1;
            } finally {
                stack.delete(cId);
            }
        }

        type.creatures.forEach(c => getCreatureLevel(c.id));

        // 2. Ггрупування за поколіннями
        const generations = {};
        type.creatures.forEach(c => {
            const gen = creatureLevels[c.id];
            if (!generations[gen]) generations[gen] = [];
            generations[gen].push(c);
        });

        const getCreatureNameById = (id) => {
            if (!id) return null;
            const found = type.creatures.find(cr => cr.id == id);
            return found ? found.name : 'Unknown';
        };

        grid.innerHTML = '<svg id="connectors-svg"></svg>';
        
        Object.keys(generations).sort((a,b) => a-b).forEach(gen => {
            const row = document.createElement('div');
            row.className = 'generation-row';
            row.innerHTML = `<div class="gen-label">GENERATION ${gen}</div>`;
            
            generations[gen].forEach(c => {
                const lvl = calculateLvl(c.stats, c.muts);
                const motherName = getCreatureNameById(c.motherId);
                const fatherName = getCreatureNameById(c.fatherId);

                const parentsHtml = (motherName || fatherName) ? 
                    `<div class="card-parents-info">M: <span class="parent-link" onclick="scrollToCreature('${c.motherId}')">${motherName || '—'}</span> | F: <span class="parent-link" onclick="scrollToCreature('${c.fatherId}')">${fatherName || '—'}</span></div>` : 
                    '<div class="card-parents-info" style="opacity:0">No parents</div>';

                row.innerHTML += `
                    <div class="creature-card" data-id="${c.id}" data-m="${c.motherId || ''}" data-f="${c.fatherId || ''}"
                         onclick="handleCreatureCardClick(event, '${c.id}')"
                         onmouseenter="previewCreatureLineage('${c.id}')" onmouseleave="clearPreviewCreatureLineage()">
                        <div class="card-actions-vertical">
                            <button class="card-edit-btn" onclick="openModal(${c.id})" title="Edit Creature">
                                <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                            </button>
                        </div>
                        <div class="card-gender-strip" style="${getGenderStripStyle(c.gender)}"></div>
                        <span class="card-name"><span class="card-name-text">${c.name}</span>${c.mut ? '<span class="card-mut-badge">MUT</span>' : ''}</span>
                        <div class="card-level-info">LVL ${lvl} <span style="margin: 0 4px; opacity: 0.5;">|</span> MAX ${lvl + 88}</div>

                        ${parentsHtml}
                        <div class="card-stats-mini">

                            <div class="stat-row"><span class="stat-label">HP</span><span class="card-stat-val">${renderStat(c.stats.hp, c.muts?.hp, c.mut)}</span><span class="stat-label second-col-label">ST</span><span class="card-stat-val">${renderStat(c.stats.st, c.muts?.st, c.mut)}</span></div>
                            <div class="stat-row"><span class="stat-label">OX</span><span class="card-stat-val">${renderStat(c.stats.ox, c.muts?.ox, c.mut)}</span><span class="stat-label second-col-label">FD</span><span class="card-stat-val">${renderStat(c.stats.fd, c.muts?.fd, c.mut)}</span></div>
                            <div class="stat-row"><span class="stat-label">WT</span><span class="card-stat-val">${renderStat(c.stats.wt, c.muts?.wt, c.mut)}</span><span class="stat-label second-col-label">ML</span><span class="card-stat-val">${renderStat(c.stats.ml, c.muts?.ml, c.mut)}</span></div>
                        </div>
                    </div>`;
            });
            grid.appendChild(row);
        });

        setTimeout(drawConnectors, 100); // Даємо час на рендер перед малюванням ліній
    }

    function getActiveCreatureHighlightId() {
        return selectedCreatureId || previewCreatureId;
    }

    function applyCreatureHighlightState() {
        document.querySelectorAll('.creature-card').forEach(card => {
            card.classList.remove('highlight-mother', 'highlight-father', 'highlight-child', 'is-selected');
        });

        const activeId = getActiveCreatureHighlightId();
        if (!activeId) return;

        const selectedCard = document.querySelector(`.creature-card[data-id="${activeId}"]`);
        if (!selectedCard) return;

        selectedCard.classList.add('is-selected');
        const mId = selectedCard.dataset.m;
        const fId = selectedCard.dataset.f;

        document.querySelectorAll('.creature-card').forEach(card => {
            const cardId = card.dataset.id;
            const cardMother = card.dataset.m;
            const cardFather = card.dataset.f;

            if (cardId === mId) card.classList.add('highlight-mother');
            if (cardId === fId) card.classList.add('highlight-father');
            if (cardMother === String(activeId) || cardFather === String(activeId)) card.classList.add('highlight-child');
        });
    }

    function handleCreatureCardClick(event, creatureId) {
        if (event.target.closest('button, .action-btn, .card-edit-btn, .parent-link')) return;
        selectedCreatureId = String(creatureId);
        previewCreatureId = null;
        applyCreatureHighlightState();
        drawConnectors();
    }

    function previewCreatureLineage(creatureId) {
        if (selectedCreatureId) return;
        previewCreatureId = String(creatureId);
        applyCreatureHighlightState();
        drawConnectors();
    }

    function clearPreviewCreatureLineage() {
        if (selectedCreatureId) return;
        previewCreatureId = null;
        applyCreatureHighlightState();
        drawConnectors();
    }

    function clearSelectedCreature() {
        selectedCreatureId = null;
        previewCreatureId = null;
        applyCreatureHighlightState();
        drawConnectors();
    }

    function drawConnectors() {
        const svg = document.getElementById('connectors-svg');
        if (!svg) return;
        const grid = document.getElementById('creaturesGrid');
        svg.innerHTML = '';
        const rect = grid.getBoundingClientRect();
        svg.setAttribute('viewBox', `0 0 ${rect.width} ${rect.height}`);
        const activeId = getActiveCreatureHighlightId();

        document.querySelectorAll('.creature-card').forEach(child => {
            const cRect = child.getBoundingClientRect();
            const parents = [
                {id: child.dataset.m, color: 'rgba(245, 61, 134, 0.32)', activeColor: 'rgba(245, 61, 134, 0.98)', glow: 'rgba(245, 61, 134, 0.42)'},
                {id: child.dataset.f, color: 'rgba(61, 134, 245, 0.32)', activeColor: 'rgba(61, 134, 245, 0.98)', glow: 'rgba(61, 134, 245, 0.42)'}
            ];

            parents.forEach(p => {
                if (!p.id) return;
                const parent = document.querySelector(`.creature-card[data-id="${p.id}"]`);
                if (!parent) return;
                const pRect = parent.getBoundingClientRect();
                const isActiveLine = activeId && (String(child.dataset.id) === String(activeId) || String(p.id) === String(activeId));

                const x1 = (pRect.left + pRect.width / 2) - rect.left;
                const y1 = pRect.bottom - rect.top;
                const x2 = (cRect.left + cRect.width / 2) - rect.left;
                const y2 = cRect.top - rect.top;

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                const cp = (y2 - y1) / 2;
                path.setAttribute('d', `M ${x1} ${y1} C ${x1} ${y1 + cp}, ${x2} ${y2 - cp}, ${x2} ${y2}`);
                path.setAttribute('stroke', isActiveLine ? p.activeColor : p.color);
                path.setAttribute('stroke-width', isActiveLine ? '4' : '2.5');
                path.setAttribute('opacity', isActiveLine ? '1' : '0.55');
                path.setAttribute('stroke-linecap', 'round');
                path.setAttribute('stroke-linejoin', 'round');
                path.setAttribute('fill', 'none');
                path.style.filter = `drop-shadow(0 0 8px ${isActiveLine ? p.glow : 'rgba(255,255,255,0.04)'})`;
                svg.appendChild(path);
            });
        });
    }


    function scrollToCreature(id) {
        if (!id || id === 'null') return;
        const target = document.querySelector(`.creature-card[data-id="${id}"]`);
        if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            target.style.transition = '0.3s';
            target.style.borderColor = 'var(--accent)';
            setTimeout(() => target.style.borderColor = '', 1000);
        }
    }

    function saveCreature() {
        const type = getDinoTypeById(selectedDinoId);
        if (!type) return;
        const existingCreature = editingCreatureId === null ? null : getCreatureById(type, editingCreatureId);
        const creatureId = existingCreature ? existingCreature.id : getNextCreatureId(type);

        const creature = {
            id: creatureId,
            name: document.getElementById('m-name').value || "Unnamed",
            motherId: document.getElementById('m-mother').value || null,
            fatherId: document.getElementById('m-father').value || null,
            gender: document.getElementById('bm').classList.contains('active-m') ? 'M' : 'F',
            mut: document.getElementById('m-mut').checked,
            stats: {
                hp: document.getElementById('s-hp').value,
                st: document.getElementById('s-st').value,
                ox: document.getElementById('s-ox').value,
                fd: document.getElementById('s-fd').value,
                wt: document.getElementById('s-wt').value,
                ml: document.getElementById('s-ml').value
            },
            muts: {
                hp: document.getElementById('s-hp-m').value,
                st: document.getElementById('s-st-m').value,
                ox: document.getElementById('s-ox-m').value,
                fd: document.getElementById('s-fd-m').value,
                wt: document.getElementById('s-wt-m').value,
                ml: document.getElementById('s-ml-m').value
            }
        };

        const creatureIndex = editingCreatureId === null ? -1 : type.creatures.findIndex(item => item.id == editingCreatureId);

        if (creatureIndex === -1) {
            type.creatures.push(creature);
        } else {
            type.creatures[creatureIndex] = creature;
        }
        
        saveToStorage();
        renderCreatures();
        closeModal();
        resetCreatureForm();
    }

    function resetCreatureForm() {
        document.getElementById('m-name').value = '';
        document.getElementById('m-mut').checked = false;
        document.getElementById('m-mother').value = '';
        document.getElementById('m-father').value = '';
        setGender('M');
        document.querySelectorAll('.stat-input').forEach(input => input.value = '');
    }

    // ЛОГІКА SIDEBAR
    function toggleSearch() {
        const bar = document.getElementById('searchBar');
        const isActive = bar.classList.contains('active');
        
        if (!isActive) {
            bar.classList.add('active');
            setTimeout(() => document.getElementById('searchInput').focus(), 100);
        } else {
            closeSearch();
        }
    }

    function closeSearch() {
        const bar = document.getElementById('searchBar');
        if (bar.classList.contains('active')) {
            bar.classList.remove('active');
            document.getElementById('searchInput').value = '';
            renderDinoList(); // Повертаємо повний список при закритті
        }
    }

    let currentModalFav = false;

    function openTypeModal(typeId = null) {
        const editingType = typeId === null ? null : getDinoTypeById(typeId);
        if (typeId !== null && !editingType) return;
        editingTypeId = editingType ? editingType.id : null;
        const isEdit = editingTypeId !== null;
        document.getElementById('typeModalTitle').innerText = isEdit ? "EDIT TYPE NAME" : "NEW DINO TYPE";
        
        // Показуємо кнопку видалення тільки якщо це редагування
        const delBtn = document.getElementById('modalDeleteBtn');
        if (delBtn) delBtn.style.display = isEdit ? 'block' : 'none';

        currentModalFav = isEdit ? editingType.favorite : false;
        updateModalFavUI();

        document.getElementById('newTypeName').value = isEdit ? editingType.name : '';
        document.getElementById('typeModal').classList.add('active');
        setTimeout(() => document.getElementById('newTypeName').focus(), 100);
    }

    function toggleModalFav() {
        currentModalFav = !currentModalFav;
        updateModalFavUI();
    }

    function updateModalFavUI() {
        const star = document.querySelector('#modalFavBtn svg');
        star.style.fill = currentModalFav ? '#fdd835' : '#777';
    }

    function closeTypeModal() { document.getElementById('typeModal').classList.remove('active'); }

    function submitNewType() {
        const nameInput = document.getElementById('newTypeName');
        const name = nameInput.value.trim();
        
        if (name) {
            if (editingTypeId === null) {
                // Створення нового
                const newType = { id: getNextDinoTypeId(), name: name, favorite: currentModalFav, creatures: [] };
                dinoTypes.push(newType);
                selectedDinoId = newType.id;
            } else {
                // Редагування існуючого
                const editingType = getDinoTypeById(editingTypeId);
                if (!editingType) return;
                editingType.name = name;
                editingType.favorite = currentModalFav;
            }
            saveToStorage();
            renderDinoList();
            closeTypeModal();
        }
    }

    function handleModalDelete() {
        if (editingTypeId !== null) {
            confirmDeleteType(editingTypeId);
            closeTypeModal();
        }
    }

    // ЛОГІКА ПІДТВЕРДЖЕННЯ
    function showConfirm(message, onOk) {
        const modal = document.getElementById('confirmModal');
        document.getElementById('confirmMessage').innerText = message;
        modal.classList.add('active');
        document.getElementById('confirmOkBtn').onclick = () => {
            onOk();
            modal.classList.remove('active');
        };
    }

    function closeConfirmModal() { document.getElementById('confirmModal').classList.remove('active'); }

    function confirmDeleteType(typeId) {
        const type = getDinoTypeById(typeId);
        if (!type) return;
        const name = type.name;
        showConfirm(`Delete ${name}?`, () => {
            const element = document.querySelector(`.dino-item[data-id="${typeId}"]`);
            
            if (element) {
                element.classList.add('removing');
                setTimeout(() => {
                    const actualIdx = getDinoTypeIndexById(typeId);
                    if (actualIdx !== -1) dinoTypes.splice(actualIdx, 1);
                    if (selectedDinoId == typeId) selectedDinoId = dinoTypes[0]?.id ?? null;
                    saveToStorage();
                    renderDinoList();
                }, 250);
            } else {
                // Якщо елемент не знайдено (наприклад, при активному пошуку), видаляємо миттєво
                const actualIdx = getDinoTypeIndexById(typeId);
                if (actualIdx !== -1) dinoTypes.splice(actualIdx, 1);
                if (selectedDinoId == typeId) selectedDinoId = dinoTypes[0]?.id ?? null;
                saveToStorage();
                renderDinoList();
            }
        });
    }

    // МОДАЛКА
    function openModal(creatureId = null) { 
        const type = getDinoTypeById(selectedDinoId);
        if (!type) return;
        editingCreatureId = creatureId;
        const isEdit = creatureId !== null;
        
        const modal = document.getElementById('modal');
        const title = modal.querySelector('.modal-header h2');
        title.innerText = isEdit ? "EDIT DINO CARD" : "NEW DINO CARD";

        // Оновлення списків батьків
        const motherSelect = document.getElementById('m-mother');
        const fatherSelect = document.getElementById('m-father');
        motherSelect.innerHTML = '<option value="">None</option>';
        fatherSelect.innerHTML = '<option value="">None</option>';

        const currentCreature = isEdit ? getCreatureById(type, creatureId) : null;
        const currentId = currentCreature ? currentCreature.id : null;
        type.creatures.forEach(cr => {
            if (cr.id === currentId) return; // Не можна бути батьком самому собі
            const opt = `<option value="${cr.id}">${cr.name}</option>`;
            if (cr.gender === 'F') motherSelect.innerHTML += opt;
            if (cr.gender === 'M') fatherSelect.innerHTML += opt;
        });

        if (currentCreature) {
            const c = currentCreature;
            document.getElementById('m-name').value = c.name;
            document.getElementById('m-mother').value = c.motherId || '';
            document.getElementById('m-father').value = c.fatherId || '';
            document.getElementById('m-mut').checked = c.mut;
            setGender(c.gender);
            document.getElementById('s-hp').value = c.stats.hp;
            document.getElementById('s-st').value = c.stats.st;
            document.getElementById('s-ox').value = c.stats.ox;
            document.getElementById('s-fd').value = c.stats.fd;
            document.getElementById('s-wt').value = c.stats.wt;
            document.getElementById('s-ml').value = c.stats.ml;
            const m = c.muts || {};
            document.getElementById('s-hp-m').value = m.hp || 0;
            document.getElementById('s-st-m').value = m.st || 0;
            document.getElementById('s-ox-m').value = m.ox || 0;
            document.getElementById('s-fd-m').value = m.fd || 0;
            document.getElementById('s-wt-m').value = m.wt || 0;
            document.getElementById('s-ml-m').value = m.ml || 0;
        } else {
            resetCreatureForm();
        }

        document.getElementById('modal').classList.add('active'); 
    }

    function closeModal() { 
        document.getElementById('modal').classList.remove('active'); 
    }

    function setGender(g) {
        document.getElementById('bm').className = g === 'M' ? 'gen-btn active-m' : 'gen-btn';
        document.getElementById('bf').className = g === 'F' ? 'gen-btn active-f' : 'gen-btn';
    }

    function confirmDelete() { 
        const type = getDinoTypeById(selectedDinoId);
        if (!type || editingCreatureId === null) {
            closeModal();
            return;
        }
        showConfirm("Delete this record?", () => {
            const creatureIndex = type.creatures.findIndex(creature => creature.id == editingCreatureId);
            if (creatureIndex !== -1) {
                type.creatures.splice(creatureIndex, 1);
            }
            saveToStorage();
            renderCreatures();
            closeModal();
        });
    }

    function exportData() {
        const payload = {
            version: 1,
            exportedAt: new Date().toISOString(),
            dinoTypes
        };

        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `ark-breeding-export-${new Date().toISOString().slice(0, 10)}.json`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
    }

    async function importData(event) {
        const file = event.target.files?.[0];
        event.target.value = '';
        if (!file) return;

        try {
            const text = await file.text();
            const parsed = JSON.parse(text);
            const importedTypes = Array.isArray(parsed) ? parsed : parsed?.dinoTypes;

            if (!Array.isArray(importedTypes)) {
                throw new Error('Invalid data format');
            }

            dinoTypes = importedTypes.map(normalizeDinoType);
            selectedDinoId = dinoTypes[0]?.id ?? null;
            editingTypeId = null;
            saveToStorage();
            renderDinoList();
        } catch (error) {
            alert('Import failed: invalid JSON or unsupported file structure.');
        }
    }

    // Реєстрація Service Worker для PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => {
                console.log('SW registration failed: ', err);
            });
        });
    }

    // Гарячі клавіші для модалки типу
    document.getElementById('newTypeName').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') submitNewType();
        if (e.key === 'Escape') closeTypeModal();
    });

    document.getElementById('sidebarImportInput').addEventListener('change', importData);

    // Закриття пошуку при кліку поза ним
    document.addEventListener('click', (e) => {
        const bar = document.getElementById('searchBar');
        const toggleBtn = document.querySelector('.add-type-btn[onclick="toggleSearch()"]');
        
        if (bar.classList.contains('active') && !bar.contains(e.target) && !toggleBtn.contains(e.target)) {
            closeSearch();
        }

        const clickedInsideInteractiveElement = e.target.closest('.creature-card, .modal, button, input, select, textarea, label, a');
        if (!clickedInsideInteractiveElement) {
            clearSelectedCreature();
        }
    });

    // ПОВНИЙ ЕКРАН (FULLSCREEN)
    function toggleFullscreen() {
        if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement && !document.msFullscreenElement) {
            const docEl = document.documentElement;
            const requestFS = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullscreen || docEl.msRequestFullscreen;
            if (requestFS) {
                requestFS.call(docEl).catch(err => {
                    console.log('Error attempting to enable full-screen mode:', err);
                });
            }
        } else {
            const exitFS = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
            if (exitFS) {
                exitFS.call(document).catch(err => {
                    console.log('Error attempting to exit full-screen mode:', err);
                });
            }
        }
    }

    function updateFullscreenButton() {
        const btn = document.getElementById('fullscreenBtn');
        const iconSvg = document.getElementById('fullscreenIcon');
        if (!btn || !iconSvg) return;
        const isFS = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
        
        if (isFS) {
            btn.title = 'Exit Fullscreen';
            iconSvg.innerHTML = '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>';
        } else {
            btn.title = 'Fullscreen';
            iconSvg.innerHTML = '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
        }
    }

    function initFullscreen() {
        const enterFS = () => {
            if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement && !document.msFullscreenElement) {
                const docEl = document.documentElement;
                const requestFS = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullscreen || docEl.msRequestFullscreen;
                if (requestFS) {
                    requestFS.call(docEl).catch(err => {
                        console.log('Error attempting to enable full-screen mode:', err);
                    });
                }
            }
            // Видаляємо обробники подій після першої ж взаємодії
            document.removeEventListener('click', enterFS);
            document.removeEventListener('keydown', enterFS);
            document.removeEventListener('touchstart', enterFS);
        };

        document.addEventListener('click', enterFS);
        document.addEventListener('keydown', enterFS);
        document.addEventListener('touchstart', enterFS);
    }

    document.addEventListener('fullscreenchange', updateFullscreenButton);
    document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
    document.addEventListener('mozfullscreenchange', updateFullscreenButton);
    document.addEventListener('MSFullscreenChange', updateFullscreenButton);

    // СТАРТ
    loadFromStorage();
    syncMobileLayout();
    renderDinoList();
    initFullscreen();

    // Перемальовувати лінії при зміні розміру
    window.addEventListener('resize', drawConnectors);
    window.addEventListener('resize', syncMobileLayout);
</script>
